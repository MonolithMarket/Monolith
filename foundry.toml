[profile.default]
src = "src"
out = "out"
libs = ["lib"]
no_match_coverage = "test"
optimizer = true
optimizer_runs = 200
via-ir = true

# Halmos compatibility profile: Halmos requires the AST in the build artifacts,
# which `via-ir = true` strips out. Halmos reads from `out/`, so this profile
# also writes to `out/` but with via-ir disabled.
# Workflow:
#   forge clean
#   FOUNDRY_PROFILE=halmos forge build
#   FOUNDRY_PROFILE=halmos halmos ...
[profile.halmos]
src = "src"
out = "out"
libs = ["lib"]
optimizer = false
via-ir = false
ast = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
